<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Website Demos</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:linear-gradient(135deg,#0ea5e9,#2563eb);
        }

        .container{
            background:#fff;
            padding:50px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.2);
        }

        h1{
            margin-bottom:30px;
            color:#1e3a8a;
        }

        .buttons{
            display:flex;
            gap:20px;
            justify-content:center;
            flex-wrap:wrap;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            padding:15px 35px;
            border-radius:8px;
            background:#2563eb;
            color:#fff;
            font-size:18px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#1d4ed8;
            transform:translateY(-3px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Dental Website Demos</h1>

    <div class="buttons">
        <a href="demo1/index.html" class="btn">Demo 1</a>
        <a href="demo2/index.html" class="btn">Demo 2</a>
    </div>
</div>

</body>
</html>
